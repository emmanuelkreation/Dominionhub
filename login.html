<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login / Sign Up – Dominion Home Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      background: rgba(255,255,255,0.95);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      padding: 1rem 0;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1e3a8a;
      text-decoration: none;
    }
    .logo span { color: #d97706; }
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem 1rem;
    }
    .auth-card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1e3a8a;
    }
    .auth-header p {
      color: #6b7280;
      margin-top: 0.5rem;
    }
    .toggle-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      background: #f1f5f9;
      border-radius: 3rem;
      padding: 0.25rem;
    }
    .toggle-btn {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      border: none;
      background: transparent;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #4b5563;
    }
    .toggle-btn.active {
      background: #1e3a8a;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #374151;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.75rem;
      font-size: 1rem;
      transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #1e3a8a;
      box-shadow: 0 0 0 2px rgba(30,58,138,0.1);
    }
    .btn-auth {
      width: 100%;
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 1rem;
    }
    .btn-auth:hover {
      background: #2563eb;
    }
    .btn-google {
      background: white;
      color: #4b5563;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .btn-google:hover {
      background: #f8fafc;
    }
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.75rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .success-message {
      background: #dcfce7;
      color: #16a34a;
      padding: 0.75rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .divider {
      text-align: center;
      margin: 1rem 0;
      position: relative;
      color: #9ca3af;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e2e8f0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    footer {
      background: #0f172a;
      color: #cbd5e1;
      text-align: center;
      padding: 1.5rem;
      margin-top: 2rem;
    }
    @media (max-width: 640px) {
      .auth-card { padding: 1.5rem; margin: 1rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-container">
    <a href="index.html" class="logo">Dominion <span>Home Hub</span></a>
    <div></div>
  </div>
</nav>

<div class="main">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to access your dashboard</p>
    </div>

    <div class="toggle-buttons">
      <button id="loginTabBtn" class="toggle-btn active">Login</button>
      <button id="signupTabBtn" class="toggle-btn">Sign Up</button>
    </div>

    <div id="errorMsg" class="error-message"></div>
    <div id="successMsg" class="success-message"></div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button id="loginBtn" class="btn-auth">Log In</button>
      <button id="googleLoginBtn" class="btn-auth btn-google"><i class="fab fa-google"></i> Continue with Google</button>
    </div>

    <!-- Sign Up Form (hidden initially) -->
    <div id="signupForm" style="display: none;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirmPassword" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>I am a...</label>
        <select id="signupRole">
          <option value="buyer">Buyer (looking to buy/rent)</option>
          <option value="seller">Seller (listing properties)</option>
        </select>
      </div>
      <button id="signupBtn" class="btn-auth">Create Account</button>
      <button id="googleSignupBtn" class="btn-auth btn-google"><i class="fab fa-google"></i> Continue with Google</button>
    </div>

    <div class="divider">or</div>
    <p style="text-align: center; font-size: 0.8rem; color: #6b7280;">
      By continuing, you agree to Dominion Home Hub's Terms and Privacy Policy.
    </p>
  </div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2025 Dominion Home Hub – Your Real Estate Partner</p>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAhgR45OO17vNl-xO7r2dgrRiJ7Kp1hVc4",
    authDomain: "dominion-1e85f.firebaseapp.com",
    databaseURL: "https://dominion-1e85f-default-rtdb.firebaseio.com",
    projectId: "dominion-1e85f",
    storageBucket: "dominion-1e85f.firebasestorage.app",
    messagingSenderId: "1036601319820",
    appId: "1:1036601319820:web:3395f663c3e05326ed76a9",
    measurementId: "G-BZLJPTFMZ1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const googleProvider = new GoogleAuthProvider();

  const loginTab = document.getElementById('loginTabBtn');
  const signupTab = document.getElementById('signupTabBtn');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');

  let redirectUrl = null;

  function getRedirectUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('redirect');
  }

  function showError(message) {
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
  }

  function showSuccess(message) {
    successDiv.textContent = message;
    successDiv.style.display = 'block';
    setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
  }

  // ---------- FIXED: Save user to database with explicit logging ----------
  async function saveUserToDatabase(uid, email, displayName, role) {
    try {
      await set(ref(db, `users/${uid}`), {
        email: email,
        displayName: displayName,
        role: role,
        createdAt: new Date().toISOString()
      });
      console.log("✅ User saved to database:", uid, role);
      return true;
    } catch (error) {
      console.error("❌ Error saving user to database:", error);
      throw error;
    }
  }

  async function getUserRole(uid) {
    try {
      const snapshot = await get(child(ref(db), `users/${uid}/role`));
      return snapshot.exists() ? snapshot.val() : null;
    } catch (error) {
      console.error("Error fetching role:", error);
      return null;
    }
  }

  // ---------- SIGN UP (Fixed flow) ----------
  document.getElementById('signupBtn').addEventListener('click', async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirmPassword').value;
    const role = document.getElementById('signupRole').value;

    if (!name || !email || !password) {
      showError('Please fill in all fields.');
      return;
    }
    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }
    if (password.length < 6) {
      showError('Password should be at least 6 characters.');
      return;
    }

    try {
      // 1. Create user in Firebase Auth
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // 2. Update display name
      await updateProfile(user, { displayName: name });

      // 3. Save user to Realtime Database (this is CRITICAL)
      await saveUserToDatabase(user.uid, user.email, name, role);

      showSuccess('Account created successfully! Redirecting...');

      // 4. Redirect based on role
      setTimeout(() => {
        if (role === 'seller') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'buyer-dashboard.html';
        }
      }, 1500);

    } catch (error) {
      console.error("Signup error:", error);
      if (error.code === 'auth/email-already-in-use') {
        showError('Email already registered. Please log in.');
      } else {
        showError(error.message);
      }
    }
  });

  // ---------- LOGIN ----------
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) {
      showError('Please enter email and password.');
      return;
    }
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      showSuccess('Login successful! Redirecting...');
      const role = await getUserRole(user.uid);
      setTimeout(() => {
        if (role === 'seller') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'buyer-dashboard.html';
        }
      }, 1000);
    } catch (error) {
      console.error(error);
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
        showError('Invalid email or password.');
      } else {
        showError(error.message);
      }
    }
  });

  // ---------- GOOGLE SIGN-IN (Fixed) ----------
  async function handleGoogleSignIn(role = 'buyer') {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user = result.user;
      const existingRole = await getUserRole(user.uid);
      if (!existingRole) {
        await saveUserToDatabase(user.uid, user.email, user.displayName || 'Google User', role);
      }
      showSuccess('Google sign-in successful! Redirecting...');
      const finalRole = existingRole || role;
      setTimeout(() => {
        if (finalRole === 'seller') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'buyer-dashboard.html';
        }
      }, 1000);
    } catch (error) {
      console.error(error);
      showError(error.message);
    }
  }

  document.getElementById('googleLoginBtn').addEventListener('click', () => handleGoogleSignIn('buyer'));
  document.getElementById('googleSignupBtn').addEventListener('click', () => {
    const role = prompt("Select role: type 'buyer' or 'seller'", "buyer");
    if (role === 'seller' || role === 'buyer') {
      handleGoogleSignIn(role);
    } else {
      showError('Invalid role. Please try again.');
    }
  });

  // ---------- TAB SWITCHING ----------
  loginTab.addEventListener('click', () => {
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    document.querySelector('.auth-header h2').textContent = 'Welcome Back';
    document.querySelector('.auth-header p').textContent = 'Sign in to access your dashboard';
  });
  signupTab.addEventListener('click', () => {
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    document.querySelector('.auth-header h2').textContent = 'Create Account';
    document.querySelector('.auth-header p').textContent = 'Join Dominion Home Hub today';
  });

  // ---------- AUTO-REDIRECT IF ALREADY LOGGED IN ----------
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      redirectUrl = getRedirectUrl();
      if (redirectUrl) {
        window.location.href = redirectUrl;
      } else {
        const role = await getUserRole(user.uid);
        if (role === 'seller') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'buyer-dashboard.html';
        }
      }
    } else {
      redirectUrl = getRedirectUrl();
    }
  });
</script>
</body>
</html>
