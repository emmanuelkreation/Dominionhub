<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Property Details – Dominion Home Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #1f2937;
      line-height: 1.5;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }
    /* Navigation (same as homepage) */
    .navbar {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1e3a8a;
      text-decoration: none;
    }
    .logo span { color: #d97706; }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: #4b5563;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #1e3a8a; }
    .btn-outline {
      border: 1.5px solid #1e3a8a;
      background: transparent;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: #1e3a8a;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover {
      background: #1e3a8a;
      color: white;
    }
    .btn-primary {
      background: #1e3a8a;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    /* Property Detail Layout */
    .detail-container {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin: 2rem 0;
    }
    /* Image Gallery */
    .gallery {
      background: #f3f4f6;
      border-radius: 1rem;
      overflow: hidden;
    }
    .main-image {
      width: 100%;
      height: 400px;
      background-size: cover;
      background-position: center;
    }
    .thumbnail-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem;
      overflow-x: auto;
    }
    .thumbnail {
      width: 80px;
      height: 60px;
      background-size: cover;
      background-position: center;
      border-radius: 0.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .thumbnail.active {
      opacity: 1;
      border: 2px solid #d97706;
    }
    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 768px) {
      .info-grid { grid-template-columns: 1fr; }
    }
    .property-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .property-location {
      color: #6b7280;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .price-large {
      font-size: 2rem;
      font-weight: 800;
      color: #1e3a8a;
      margin: 1rem 0;
    }
    .features-list {
      display: flex;
      gap: 2rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f1f5f9;
      padding: 0.5rem 1rem;
      border-radius: 40px;
    }
    .description {
      margin: 1.5rem 0;
      line-height: 1.6;
    }
    .seller-card {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid #e2e8f0;
    }
    .seller-card h3 {
      margin-bottom: 1rem;
    }
    .contact-btn {
      width: 100%;
      background: #d97706;
      margin-top: 1rem;
    }
    .contact-btn:hover {
      background: #b45309;
    }
    /* Mortgage Calculator */
    .mortgage-calc {
      background: #f1f5f9;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .mortgage-calc h4 {
      margin-bottom: 1rem;
    }
    .mortgage-calc input {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 0.8rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
    }
    .mortgage-calc button {
      background: #1e3a8a;
    }
    /* Map */
    .map-container {
      height: 300px;
      border-radius: 1rem;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    .back-link {
      display: inline-block;
      margin: 1rem 0;
      color: #1e3a8a;
      text-decoration: none;
    }
    footer {
      background: #0f172a;
      color: #cbd5e1;
      padding: 2rem 0;
      margin-top: 2rem;
      text-align: center;
    }
    .loading {
      text-align: center;
      padding: 4rem;
    }
    .error {
      text-align: center;
      padding: 4rem;
      color: red;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-container">
    <a href="index.html" class="logo">Dominion <span>Home Hub</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="listings.html?type=buy">Buy</a>
      <a href="listings.html?type=rent">Rent</a>
      <a href="listings.html?type=lease">Lease</a>
      <a href="#">Sell</a>
      <a href="#">Contact</a>
      <button class="btn-outline" id="loginNavBtn">Log in</button>
      <button class="btn-primary" id="signupNavBtn">Sign up</button>
    </div>
  </div>
</nav>

<div class="container">
  <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Back to Listings</a>
  <div id="propertyDetail" class="detail-container">
    <div class="loading">Loading property details...</div>
  </div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2025 Dominion Home Hub – Find your legacy.</p>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAhgR45OO17vNl-xO7r2dgrRiJ7Kp1hVc4",
    authDomain: "dominion-1e85f.firebaseapp.com",
    databaseURL: "https://dominion-1e85f-default-rtdb.firebaseio.com",
    projectId: "dominion-1e85f",
    storageBucket: "dominion-1e85f.firebasestorage.app",
    messagingSenderId: "1036601319820",
    appId: "1:1036601319820:web:3395f663c3e05326ed76a9",
    measurementId: "G-BZLJPTFMZ1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  const detailContainer = document.getElementById('propertyDetail');
  let map = null;
  let currentProperty = null;
  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    // If property already loaded, update contact button text/behavior
    if (currentProperty) {
      updateContactButton();
    }
  });

  function getListingLabel(type) {
    if (type === 'buy') return 'For Sale';
    if (type === 'rent') return 'For Rent';
    return 'For Lease';
  }

  function formatPrice(price) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(price);
  }

  function updateContactButton() {
    const contactBtn = document.getElementById('contactSellerBtn');
    if (!contactBtn) return;
    if (!currentUser) {
      contactBtn.textContent = 'Log in to Contact Seller';
      contactBtn.onclick = () => {
        window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
      };
    } else {
      contactBtn.textContent = 'Contact Seller';
      contactBtn.onclick = () => {
        // In future: create a chat and redirect
        alert("Chat feature coming soon! For now, please email seller@dominionhub.com");
        // Later: window.location.href = `chat.html?propertyId=${currentProperty.id}&sellerId=${currentProperty.sellerId}`;
      };
    }
  }

  function initMap(lat, lng, address) {
    if (!map && document.getElementById('map')) {
      map = L.map('map').setView([lat, lng], 13);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
      }).addTo(map);
      L.marker([lat, lng]).addTo(map).bindPopup(address).openPopup();
    } else if (map && lat && lng) {
      map.setView([lat, lng], 13);
      L.marker([lat, lng]).addTo(map).bindPopup(address).openPopup();
    }
  }

  function renderProperty(property, id) {
    const images = property.images && property.images.length ? property.images : ['https://via.placeholder.com/800x400?text=No+Image'];
    const mainImage = images[0];
    const listingLabel = getListingLabel(property.listingType);
    const typeClass = property.listingType === 'rent' ? 'rent' : (property.listingType === 'lease' ? 'lease' : '');
    
    let galleryHtml = `
      <div class="gallery">
        <div class="main-image" id="mainImage" style="background-image: url('${mainImage}');"></div>
        <div class="thumbnail-row" id="thumbnailRow">
    `;
    images.forEach((img, idx) => {
      galleryHtml += `<div class="thumbnail ${idx === 0 ? 'active' : ''}" style="background-image: url('${img}');" data-index="${idx}"></div>`;
    });
    galleryHtml += `</div></div>`;

    const featuresHtml = `
      <div class="features-list">
        <div class="feature-item"><i class="fas fa-bed"></i> ${property.bedrooms} beds</div>
        <div class="feature-item"><i class="fas fa-bath"></i> ${property.bathrooms} baths</div>
        <div class="feature-item"><i class="fas fa-ruler-combined"></i> ${property.area || 0} sqft</div>
        <div class="feature-item"><i class="fas fa-building"></i> ${property.propertyType || 'Property'}</div>
      </div>
    `;

    const descriptionHtml = `<div class="description"><p>${property.description || 'No description provided.'}</p></div>`;

    // Seller info placeholder (we could fetch from /users/${property.sellerId} but optional)
    const sellerHtml = `
      <div class="seller-card">
        <h3><i class="fas fa-user"></i> Seller Information</h3>
        <p><strong>Name:</strong> ${property.sellerName || 'Property Owner'}</p>
        <p><strong>Member since:</strong> ${property.sellerSince || '2025'}</p>
        <button id="contactSellerBtn" class="btn-primary contact-btn">Contact Seller</button>
      </div>
    `;

    // Mortgage calculator
    const mortgageHtml = `
      <div class="mortgage-calc">
        <h4>Mortgage Calculator</h4>
        <input type="number" id="downPayment" placeholder="Down Payment ($)" value="${Math.round(property.price * 0.2)}">
        <input type="number" id="interestRate" placeholder="Interest Rate (%)" value="6.5">
        <input type="number" id="loanTerm" placeholder="Loan Term (years)" value="30">
        <button id="calculateBtn" class="btn-primary">Calculate Monthly Payment</button>
        <p id="paymentResult" style="margin-top: 1rem; font-weight: bold;"></p>
      </div>
    `;

    let mapHtml = '';
    if (property.lat && property.lng) {
      mapHtml = `<div id="map" class="map-container"></div>`;
    }

    const fullHtml = `
      ${galleryHtml}
      <div class="info-grid">
        <div>
          <h1 class="property-title">${listingLabel} at ${property.location.split(',')[0]}</h1>
          <div class="property-location"><i class="fas fa-map-marker-alt"></i> ${property.location}</div>
          <div class="price-large">${formatPrice(property.price)} <span class="listing-type-badge ${typeClass}" style="font-size:1rem;">${listingLabel}</span></div>
          ${featuresHtml}
          ${descriptionHtml}
          ${mapHtml}
          ${mortgageHtml}
        </div>
        <div>
          ${sellerHtml}
        </div>
      </div>
    `;

    detailContainer.innerHTML = fullHtml;

    // Thumbnail click handler
    const thumbnails = document.querySelectorAll('.thumbnail');
    const mainImageDiv = document.getElementById('mainImage');
    thumbnails.forEach(thumb => {
      thumb.addEventListener('click', () => {
        const imgUrl = thumb.style.backgroundImage.slice(5, -2);
        mainImageDiv.style.backgroundImage = `url('${imgUrl}')`;
        thumbnails.forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      });
    });

    // Mortgage calculator logic
    const calculateBtn = document.getElementById('calculateBtn');
    const paymentResult = document.getElementById('paymentResult');
    if (calculateBtn) {
      calculateBtn.addEventListener('click', () => {
        const price = property.price;
        let downPayment = parseFloat(document.getElementById('downPayment').value) || 0;
        const interestRate = parseFloat(document.getElementById('interestRate').value) || 0;
        const loanTerm = parseFloat(document.getElementById('loanTerm').value) || 30;
        if (downPayment > price) downPayment = price;
        const loanAmount = price - downPayment;
        const monthlyRate = interestRate / 100 / 12;
        const numberOfPayments = loanTerm * 12;
        let monthlyPayment = 0;
        if (monthlyRate > 0) {
          monthlyPayment = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, numberOfPayments)) / (Math.pow(1 + monthlyRate, numberOfPayments) - 1);
        } else {
          monthlyPayment = loanAmount / numberOfPayments;
        }
        paymentResult.textContent = `Estimated Monthly Payment: ${formatPrice(monthlyPayment)} (principal & interest)`;
      });
    }

    // Initialize map if coordinates exist
    if (property.lat && property.lng) {
      setTimeout(() => {
        initMap(property.lat, property.lng, property.location);
      }, 100);
    }

    // Update contact button based on auth state
    updateContactButton();
  }

  async function loadProperty() {
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = urlParams.get('id');
    if (!propertyId) {
      detailContainer.innerHTML = '<div class="error">No property ID provided.</div>';
      return;
    }
    try {
      const dbRef = ref(db);
      const snapshot = await get(child(dbRef, `properties/${propertyId}`));
      if (snapshot.exists()) {
        currentProperty = { id: propertyId, ...snapshot.val() };
        renderProperty(currentProperty, propertyId);
      } else {
        detailContainer.innerHTML = '<div class="error">Property not found.</div>';
      }
    } catch (error) {
      console.error("Error loading property:", error);
      detailContainer.innerHTML = '<div class="error">Error loading property details.</div>';
    }
  }

  // Auth nav buttons
  document.getElementById('loginNavBtn')?.addEventListener('click', () => window.location.href = 'login.html');
  document.getElementById('signupNavBtn')?.addEventListener('click', () => window.location.href = 'login.html?signup=true');

  loadProperty();
</script>
</body>
</html>
