<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Property Details – Dominion Home Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #1f2937; line-height: 1.5; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    /* Navbar */
    .navbar {
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1e3a8a;
      text-decoration: none;
    }
    .logo span { color: #d97706; }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: #4b5563;
      font-weight: 500;
    }
    .btn-outline {
      border: 1.5px solid #1e3a8a;
      background: transparent;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: #1e3a8a;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: #1e3a8a;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    /* Detail Layout */
    .detail-container { margin: 2rem 0; }
    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: #1e3a8a;
      text-decoration: none;
    }
    /* Gallery */
    .gallery {
      background: #f3f4f6;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .main-image {
      width: 100%;
      height: 400px;
      background-size: cover;
      background-position: center;
      transition: background-image 0.2s;
    }
    .thumbnail-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.8rem;
      overflow-x: auto;
    }
    .thumbnail {
      width: 80px;
      height: 60px;
      background-size: cover;
      background-position: center;
      border-radius: 0.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .thumbnail.active { opacity: 1; border: 2px solid #d97706; }
    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 768px) { .info-grid { grid-template-columns: 1fr; } }
    .property-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .property-location { color: #6b7280; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .price-large { font-size: 2rem; font-weight: 800; color: #1e3a8a; margin: 1rem 0; }
    .features-list {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f1f5f9;
      padding: 0.5rem 1rem;
      border-radius: 40px;
    }
    .description { margin: 1.5rem 0; line-height: 1.6; }
    .seller-card {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid #e2e8f0;
      position: sticky;
      top: 100px;
    }
    .contact-btn { width: 100%; background: #d97706; margin-top: 1rem; }
    .contact-btn:hover { background: #b45309; }
    .save-btn {
      background: white;
      border: 1px solid #1e3a8a;
      color: #1e3a8a;
      width: 100%;
      margin-top: 0.5rem;
    }
    .save-btn.saved { background: #1e3a8a; color: white; border: none; }
    .save-btn.saved i { color: white; }
    .mortgage-calc {
      background: #f1f5f9;
      border-radius: 1rem;
      padding: 1.2rem;
      margin-top: 1.5rem;
    }
    .mortgage-calc input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
    }
    .map-container {
      height: 250px;
      border-radius: 1rem;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    footer {
      background: #0f172a;
      color: #cbd5e1;
      padding: 2rem 0;
      margin-top: 3rem;
      text-align: center;
    }
    .loading, .error { text-align: center; padding: 3rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-container">
    <a href="index.html" class="logo">Dominion <span>Home Hub</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <button class="btn-outline" id="loginNavBtn">Log in</button>
      <button class="btn-primary" id="signupNavBtn">Sign up</button>
    </div>
  </div>
</nav>

<div class="container">
  <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Back to Listings</a>
  <div id="propertyDetail" class="detail-container">
    <div class="loading">Loading property details...</div>
  </div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2025 Dominion Home Hub – Find your legacy.</p>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAhgR45OO17vNl-xO7r2dgrRiJ7Kp1hVc4",
    authDomain: "dominion-1e85f.firebaseapp.com",
    databaseURL: "https://dominion-1e85f-default-rtdb.firebaseio.com",
    projectId: "dominion-1e85f",
    storageBucket: "dominion-1e85f.firebasestorage.app",
    messagingSenderId: "1036601319820",
    appId: "1:1036601319820:web:3395f663c3e05326ed76a9",
    measurementId: "G-BZLJPTFMZ1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  let currentProperty = null;
  let currentUser = null;
  let isSaved = false;

  const detailContainer = document.getElementById('propertyDetail');

  function formatPrice(price) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(price);
  }

  function getListingLabel(type) {
    if (type === 'buy') return 'For Sale';
    if (type === 'rent') return 'For Rent';
    return 'For Lease';
  }

  // Store recently viewed in localStorage
  function storeRecentlyViewed(property) {
    let viewed = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
    viewed = viewed.filter(p => p.id !== property.id);
    viewed.unshift({
      id: property.id,
      location: property.location.split(',')[0],
      price: property.price,
      image: property.images && property.images[0] ? property.images[0] : ''
    });
    if (viewed.length > 10) viewed.pop();
    localStorage.setItem('recentlyViewed', JSON.stringify(viewed));
  }

  // Check if property is saved by current user
  async function checkSavedStatus() {
    if (!currentUser) return false;
    const snapshot = await get(child(ref(db), `users/${currentUser.uid}/savedProperties`));
    const saved = snapshot.exists() ? snapshot.val() : [];
    return saved.includes(currentProperty.id);
  }

  // Toggle saved property
  async function toggleSaveProperty() {
    if (!currentUser) {
      window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
      return;
    }
    const userRef = ref(db, `users/${currentUser.uid}/savedProperties`);
    const snapshot = await get(userRef);
    let saved = snapshot.exists() ? snapshot.val() : [];
    if (isSaved) {
      saved = saved.filter(id => id !== currentProperty.id);
      showToast('Property removed from saved', 'success');
    } else {
      saved.push(currentProperty.id);
      showToast('Property saved to your dashboard', 'success');
    }
    await update(userRef, saved);
    isSaved = !isSaved;
    updateSaveButtonUI();
  }

  function updateSaveButtonUI() {
    const saveBtn = document.getElementById('savePropertyBtn');
    if (!saveBtn) return;
    if (isSaved) {
      saveBtn.innerHTML = '<i class="fas fa-heart"></i> Saved';
      saveBtn.classList.add('saved');
    } else {
      saveBtn.innerHTML = '<i class="far fa-heart"></i> Save Property';
      saveBtn.classList.remove('saved');
    }
  }

  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.right = '20px';
    toast.style.backgroundColor = type === 'success' ? '#16a34a' : '#dc2626';
    toast.style.color = 'white';
    toast.style.padding = '12px 20px';
    toast.style.borderRadius = '8px';
    toast.style.zIndex = '1000';
    toast.style.fontSize = '14px';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Render full property details with gallery
  function renderProperty(property, id) {
    const images = property.images && property.images.length ? property.images : ['https://via.placeholder.com/800x400?text=No+Image'];
    const listingLabel = getListingLabel(property.listingType);
    const typeClass = property.listingType === 'rent' ? 'rent' : (property.listingType === 'lease' ? 'lease' : '');

    let galleryHtml = `
      <div class="gallery">
        <div class="main-image" id="mainImage" style="background-image: url('${images[0]}');"></div>
        <div class="thumbnail-row" id="thumbnailRow">
    `;
    images.forEach((img, idx) => {
      galleryHtml += `<div class="thumbnail ${idx === 0 ? 'active' : ''}" style="background-image: url('${img}');" data-index="${idx}"></div>`;
    });
    galleryHtml += `</div></div>`;

    const featuresHtml = `
      <div class="features-list">
        <div class="feature-item"><i class="fas fa-bed"></i> ${property.bedrooms} beds</div>
        <div class="feature-item"><i class="fas fa-bath"></i> ${property.bathrooms} baths</div>
        <div class="feature-item"><i class="fas fa-ruler-combined"></i> ${property.area || 0} sqft</div>
        <div class="feature-item"><i class="fas fa-building"></i> ${property.propertyType || 'Property'}</div>
      </div>
    `;

    const descriptionHtml = `<div class="description">${property.description || 'No description provided.'}</div>`;

    let mapHtml = '';
    if (property.lat && property.lng) {
      mapHtml = `<div id="map" class="map-container"></div>`;
    }

    const mortgageHtml = `
      <div class="mortgage-calc">
        <h4>Mortgage Calculator</h4>
        <input type="number" id="downPayment" placeholder="Down Payment ($)" value="${Math.round(property.price * 0.2)}">
        <input type="number" id="interestRate" placeholder="Interest Rate (%)" value="6.5">
        <input type="number" id="loanTerm" placeholder="Loan Term (years)" value="30">
        <button id="calculateBtn" class="btn-primary" style="width:100%; margin-top:0.5rem;">Calculate</button>
        <p id="paymentResult" style="margin-top: 0.8rem; font-weight: bold;"></p>
      </div>
    `;

    const fullHtml = `
      ${galleryHtml}
      <div class="info-grid">
        <div>
          <h1 class="property-title">${listingLabel} at ${property.location.split(',')[0]}</h1>
          <div class="property-location"><i class="fas fa-map-marker-alt"></i> ${property.location}</div>
          <div class="price-large">${formatPrice(property.price)}</div>
          ${featuresHtml}
          ${descriptionHtml}
          ${mapHtml}
          ${mortgageHtml}
        </div>
        <div>
          <div class="seller-card">
            <h3><i class="fas fa-user"></i> Seller Information</h3>
            <p><strong>Name:</strong> ${property.sellerName || 'Property Owner'}</p>
            <p><strong>Member since:</strong> ${property.sellerSince || '2025'}</p>
            <button id="contactSellerBtn" class="btn-primary contact-btn">Contact Seller</button>
            <button id="savePropertyBtn" class="btn-outline save-btn"><i class="far fa-heart"></i> Save Property</button>
          </div>
        </div>
      </div>
    `;

    detailContainer.innerHTML = fullHtml;

    // Gallery thumbnail click
    const thumbnails = document.querySelectorAll('.thumbnail');
    const mainImageDiv = document.getElementById('mainImage');
    thumbnails.forEach(thumb => {
      thumb.addEventListener('click', () => {
        const imgUrl = thumb.style.backgroundImage.slice(5, -2);
        mainImageDiv.style.backgroundImage = `url('${imgUrl}')`;
        thumbnails.forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      });
    });

    // Mortgage calculator
    const calculateBtn = document.getElementById('calculateBtn');
    if (calculateBtn) {
      calculateBtn.addEventListener('click', () => {
        const priceVal = property.price;
        let down = parseFloat(document.getElementById('downPayment').value) || 0;
        const rate = parseFloat(document.getElementById('interestRate').value) || 0;
        const years = parseFloat(document.getElementById('loanTerm').value) || 30;
        if (down > priceVal) down = priceVal;
        const loanAmount = priceVal - down;
        const monthlyRate = rate / 100 / 12;
        const payments = years * 12;
        let monthlyPayment = 0;
        if (monthlyRate > 0) {
          monthlyPayment = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, payments)) / (Math.pow(1 + monthlyRate, payments) - 1);
        } else {
          monthlyPayment = loanAmount / payments;
        }
        document.getElementById('paymentResult').innerHTML = `Estimated Monthly Payment: ${formatPrice(monthlyPayment)} (principal & interest)`;
      });
    }

    // Map
    if (property.lat && property.lng) {
      setTimeout(() => {
        const map = L.map('map').setView([property.lat, property.lng], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
        }).addTo(map);
        L.marker([property.lat, property.lng]).addTo(map).bindPopup(property.location).openPopup();
      }, 100);
    }

    // Contact button logic
    const contactBtn = document.getElementById('contactSellerBtn');
    if (contactBtn) {
      if (!currentUser) {
        contactBtn.textContent = 'Log in to Contact Seller';
        contactBtn.onclick = () => {
          window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
        };
      } else if (currentUser.uid === property.sellerId) {
        contactBtn.textContent = 'This is your property';
        contactBtn.disabled = true;
        contactBtn.style.opacity = '0.6';
      } else {
        contactBtn.textContent = 'Contact Seller';
        contactBtn.onclick = () => {
          window.location.href = `chat.html?propertyId=${id}&sellerId=${property.sellerId}`;
        };
      }
    }

    // Save button logic
    const saveBtn = document.getElementById('savePropertyBtn');
    if (saveBtn && currentUser) {
      checkSavedStatus().then(saved => {
        isSaved = saved;
        updateSaveButtonUI();
        saveBtn.onclick = toggleSaveProperty;
      });
    } else if (saveBtn && !currentUser) {
      saveBtn.onclick = () => {
        window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
      };
    }
  }

  // Load property from URL id
  async function loadProperty() {
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = urlParams.get('id');
    if (!propertyId) {
      detailContainer.innerHTML = '<div class="error">No property ID specified.</div>';
      return;
    }
    try {
      const snapshot = await get(child(ref(db), `properties/${propertyId}`));
      if (snapshot.exists()) {
        currentProperty = { id: propertyId, ...snapshot.val() };
        renderProperty(currentProperty, propertyId);
        storeRecentlyViewed(currentProperty);
      } else {
        detailContainer.innerHTML = '<div class="error">Property not found.</div>';
      }
    } catch (err) {
      console.error(err);
      detailContainer.innerHTML = '<div class="error">Error loading property.</div>';
    }
  }

  // Auth buttons (top nav)
  document.getElementById('loginNavBtn')?.addEventListener('click', () => window.location.href = 'login.html');
  document.getElementById('signupNavBtn')?.addEventListener('click', () => window.location.href = 'login.html?signup=true');

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (currentProperty) {
      // re-render contact button and save button if property already loaded
      renderProperty(currentProperty, currentProperty.id);
    }
  });

  loadProperty();
</script>
</body>
</html>
