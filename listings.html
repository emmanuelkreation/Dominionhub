<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Listings – Dominion Home Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #1f2937; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
    /* Navbar (same as homepage) */
    .navbar {
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1e3a8a;
      text-decoration: none;
    }
    .logo span { color: #d97706; }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: #4b5563;
      font-weight: 500;
    }
    .btn-outline {
      border: 1.5px solid #1e3a8a;
      background: transparent;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: #1e3a8a;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: #1e3a8a;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    /* Layout */
    .listings-layout {
      display: flex;
      gap: 2rem;
      margin: 2rem 0;
    }
    .filters-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      height: fit-content;
      position: sticky;
      top: 90px;
    }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-group label { font-weight: 600; display: block; margin-bottom: 0.5rem; }
    .filter-group input, .filter-group select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
    }
    .price-range { display: flex; gap: 0.5rem; }
    .map-container {
      height: 300px;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid #e2e8f0;
    }
    .results-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .view-toggle button {
      background: #f1f5f9;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    .view-toggle button.active {
      background: #1e3a8a;
      color: white;
    }
    .property-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .property-card {
      background: white;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s;
      cursor: pointer;
      position: relative;
    }
    .property-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
    }
    .card-img {
      height: 200px;
      background-size: cover;
      background-position: center;
    }
    .listing-type-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #1e3a8a;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      z-index: 2;
    }
    .listing-type-badge.rent { background: #d97706; }
    .listing-type-badge.lease { background: #10b981; }
    .card-content { padding: 1rem; }
    .price { font-size: 1.4rem; font-weight: 800; color: #1e3a8a; }
    .address { color: #6b7280; font-size: 0.85rem; margin: 0.3rem 0; display: flex; align-items: center; gap: 0.3rem; }
    .features { display: flex; gap: 1rem; font-size: 0.8rem; margin: 0.5rem 0; }
    .badge { display: inline-block; background: #eef2ff; padding: 0.2rem 0.6rem; border-radius: 30px; font-size: 0.7rem; font-weight: 600; color: #1e3a8a; }
    .list-view .property-card {
      display: flex;
      flex-direction: row;
      height: 180px;
    }
    .list-view .card-img {
      width: 240px;
      height: 100%;
    }
    .list-view .card-content { flex: 1; }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .pagination button {
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    .pagination button.active {
      background: #1e3a8a;
      color: white;
    }
    footer {
      background: #0f172a;
      color: #cbd5e1;
      padding: 2rem 0;
      margin-top: 2rem;
      text-align: center;
    }
    @media (max-width: 900px) {
      .listings-layout { flex-direction: column; }
      .filters-sidebar { width: 100%; position: static; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-container">
    <a href="index.html" class="logo">Dominion <span>Home Hub</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="listings.html?type=buy">Buy</a>
      <a href="listings.html?type=rent">Rent</a>
      <a href="listings.html?type=lease">Lease</a>
      <a href="#">Sell</a>
      <a href="#">Contact</a>
      <button class="btn-outline" id="loginNavBtn">Log in</button>
      <button class="btn-primary" id="signupNavBtn">Sign up</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="listings-layout">
    <aside class="filters-sidebar">
      <h3>Filters</h3>
      <div class="filter-group">
        <label>Location</label>
        <input type="text" id="filterLocation" placeholder="City, zip, neighborhood">
      </div>
      <div class="filter-group">
        <label>Price Range</label>
        <div class="price-range">
          <input type="number" id="minPrice" placeholder="Min">
          <input type="number" id="maxPrice" placeholder="Max">
        </div>
      </div>
      <div class="filter-group">
        <label>Bedrooms</label>
        <select id="bedrooms">
          <option value="">Any</option>
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Bathrooms</label>
        <select id="bathrooms">
          <option value="">Any</option>
          <option>1</option><option>1.5</option><option>2</option><option>2.5</option><option>3+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Property Type</label>
        <select id="propertyType">
          <option value="">All</option>
          <option>House</option><option>Apartment</option><option>Condo</option><option>Townhouse</option><option>Land</option>
        </select>
      </div>
      <button id="applyFiltersBtn" class="btn-primary" style="width:100%">Apply Filters</button>
    </aside>

    <main style="flex:1">
      <div id="map" class="map-container"></div>
      <div class="results-toolbar">
        <div><strong><span id="resultCount">0</span> properties found</strong></div>
        <div>
          <select id="sortBy">
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="newest">Newest First</option>
          </select>
        </div>
        <div class="view-toggle">
          <button id="gridViewBtn" class="active"><i class="fas fa-th"></i> Grid</button>
          <button id="listViewBtn"><i class="fas fa-list"></i> List</button>
        </div>
      </div>
      <div id="propertyResults" class="property-grid"></div>
      <div id="paginationControls" class="pagination"></div>
    </main>
  </div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2025 Dominion Home Hub – Find your legacy.</p>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAhgR45OO17vNl-xO7r2dgrRiJ7Kp1hVc4",
    authDomain: "dominion-1e85f.firebaseapp.com",
    databaseURL: "https://dominion-1e85f-default-rtdb.firebaseio.com",
    projectId: "dominion-1e85f",
    storageBucket: "dominion-1e85f.firebasestorage.app",
    messagingSenderId: "1036601319820",
    appId: "1:1036601319820:web:3395f663c3e05326ed76a9",
    measurementId: "G-BZLJPTFMZ1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  console.log("Firebase Realtime Database initialized on listings page");

  // DOM elements
  const resultsContainer = document.getElementById('propertyResults');
  const resultCountSpan = document.getElementById('resultCount');
  const applyFiltersBtn = document.getElementById('applyFiltersBtn');
  const sortSelect = document.getElementById('sortBy');
  const gridViewBtn = document.getElementById('gridViewBtn');
  const listViewBtn = document.getElementById('listViewBtn');
  const paginationDiv = document.getElementById('paginationControls');
  const filterLocationInput = document.getElementById('filterLocation');
  const minPriceInput = document.getElementById('minPrice');
  const maxPriceInput = document.getElementById('maxPrice');
  const bedroomsSelect = document.getElementById('bedrooms');
  const bathroomsSelect = document.getElementById('bathrooms');
  const propertyTypeSelect = document.getElementById('propertyType');

  // State
  let allProperties = [];      // raw from DB
  let filteredProperties = [];
  let currentPage = 1;
  const pageSize = 12;
  let currentView = 'grid';
  let map = null;
  let markersLayer = null;
  let currentListingType = 'buy';
  let urlLocation = '';

  // Helper: get URL params
  function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    currentListingType = params.get('type') || 'buy';
    urlLocation = params.get('location') || '';
    filterLocationInput.value = urlLocation;
    // Update active tab in navbar? Not needed.
  }

  // Helper: format price
  function formatPrice(price) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(price);
  }

  function getListingLabel(type) {
    if (type === 'buy') return 'For Sale';
    if (type === 'rent') return 'For Rent';
    return 'For Lease';
  }

  // Load properties from Realtime Database for the given listing type
  async function loadProperties() {
    try {
      const propertiesRef = ref(db, 'properties');
      const q = query(propertiesRef, orderByChild('listingType'), equalTo(currentListingType));
      const snapshot = await get(q);
      if (snapshot.exists()) {
        allProperties = [];
        snapshot.forEach(child => {
          allProperties.push({ id: child.key, ...child.val() });
        });
        console.log(`Loaded ${allProperties.length} properties for type ${currentListingType}`);
      } else {
        allProperties = [];
        console.log("No properties found for type", currentListingType);
      }
      applyFiltersAndRender();
    } catch (error) {
      console.error("Error loading properties:", error);
      resultsContainer.innerHTML = '<div style="text-align:center;">Error loading properties. Check console.</div>';
    }
  }

  // Apply filters client-side (since we already have all properties of the type)
  function applyFilters() {
    let results = [...allProperties];
    const locationFilter = filterLocationInput.value.trim().toLowerCase();
    if (locationFilter) {
      results = results.filter(p => p.location.toLowerCase().includes(locationFilter));
    }
    const minPrice = parseFloat(minPriceInput.value);
    const maxPrice = parseFloat(maxPriceInput.value);
    if (!isNaN(minPrice)) results = results.filter(p => p.price >= minPrice);
    if (!isNaN(maxPrice)) results = results.filter(p => p.price <= maxPrice);
    const bedrooms = bedroomsSelect.value;
    if (bedrooms) {
      const bedVal = parseInt(bedrooms);
      results = results.filter(p => p.bedrooms >= bedVal);
    }
    const bathrooms = bathroomsSelect.value;
    if (bathrooms) {
      const bathVal = parseFloat(bathrooms);
      results = results.filter(p => p.bathrooms >= bathVal);
    }
    const propType = propertyTypeSelect.value;
    if (propType) {
      results = results.filter(p => p.propertyType === propType);
    }
    return results;
  }

  function sortProperties(properties) {
    const sortValue = sortSelect.value;
    const sorted = [...properties];
    if (sortValue === 'price_asc') sorted.sort((a,b) => a.price - b.price);
    else if (sortValue === 'price_desc') sorted.sort((a,b) => b.price - a.price);
    else if (sortValue === 'newest') sorted.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    return sorted;
  }

  function renderPagination(totalItems) {
    const totalPages = Math.ceil(totalItems / pageSize);
    paginationDiv.innerHTML = '';
    if (totalPages <= 1) return;
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      if (i === currentPage) btn.classList.add('active');
      btn.addEventListener('click', () => {
        currentPage = i;
        renderResults();
        updateMapMarkers();
      });
      paginationDiv.appendChild(btn);
    }
  }

  function renderResults() {
    const sorted = sortProperties(filteredProperties);
    const start = (currentPage - 1) * pageSize;
    const paginated = sorted.slice(start, start + pageSize);
    resultCountSpan.textContent = filteredProperties.length;
    if (currentView === 'grid') {
      resultsContainer.className = 'property-grid';
    } else {
      resultsContainer.className = 'property-grid list-view';
    }
    if (paginated.length === 0) {
      resultsContainer.innerHTML = '<div style="text-align:center; grid-column:1/-1;">No properties match your filters.</div>';
    } else {
      resultsContainer.innerHTML = paginated.map(prop => {
        const imageUrl = prop.images && prop.images.length > 0 ? prop.images[0] : 'https://via.placeholder.com/600x400?text=Dominion+Home';
        const listingLabel = getListingLabel(prop.listingType);
        const typeClass = prop.listingType === 'rent' ? 'rent' : (prop.listingType === 'lease' ? 'lease' : '');
        return `
          <div class="property-card" data-id="${prop.id}">
            <div class="listing-type-badge ${typeClass}">${listingLabel}</div>
            <div class="card-img" style="background-image: url('${imageUrl}');"></div>
            <div class="card-content">
              <div class="price">${formatPrice(prop.price)}</div>
              <div class="address"><i class="fas fa-map-marker-alt"></i> ${prop.location}</div>
              <div class="features">
                <span><i class="fas fa-bed"></i> ${prop.bedrooms} beds</span>
                <span><i class="fas fa-bath"></i> ${prop.bathrooms} baths</span>
                <span><i class="fas fa-ruler-combined"></i> ${prop.area || 0} sqft</span>
              </div>
              <span class="badge">${prop.propertyType || 'Property'}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    // Attach click handlers
    document.querySelectorAll('.property-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.getAttribute('data-id');
        window.location.href = `property-detail.html?id=${id}`;
      });
    });
    renderPagination(filteredProperties.length);
  }

  // Map functions
  function initMap() {
    map = L.map('map').setView([39.8283, -98.5795], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
    }).addTo(map);
    markersLayer = L.layerGroup().addTo(map);
  }

  function updateMapMarkers() {
    markersLayer.clearLayers();
    const sorted = sortProperties(filteredProperties);
    const start = (currentPage - 1) * pageSize;
    const paginated = sorted.slice(start, start + pageSize);
    paginated.forEach(prop => {
      if (prop.lat && prop.lng) {
        const marker = L.marker([prop.lat, prop.lng]).addTo(markersLayer);
        marker.bindPopup(`
          <b>${formatPrice(prop.price)}</b><br>
          ${prop.location}<br>
          ${prop.bedrooms} beds, ${prop.bathrooms} baths<br>
          <strong>${getListingLabel(prop.listingType)}</strong>
        `);
      } else {
        // If no coordinates, we can still show a generic marker? Skip.
      }
    });
    if (paginated.length && paginated[0].lat && paginated[0].lng) {
      map.setView([paginated[0].lat, paginated[0].lng], 10);
    }
  }

  function applyFiltersAndRender() {
    filteredProperties = applyFilters();
    currentPage = 1;
    renderResults();
    updateMapMarkers();
  }

  // Event listeners
  applyFiltersBtn.addEventListener('click', applyFiltersAndRender);
  sortSelect.addEventListener('change', () => {
    renderResults();
    updateMapMarkers();
  });
  gridViewBtn.addEventListener('click', () => {
    currentView = 'grid';
    gridViewBtn.classList.add('active');
    listViewBtn.classList.remove('active');
    renderResults();
  });
  listViewBtn.addEventListener('click', () => {
    currentView = 'list';
    listViewBtn.classList.add('active');
    gridViewBtn.classList.remove('active');
    renderResults();
  });

  // Auth buttons (same as homepage)
  document.getElementById('loginNavBtn')?.addEventListener('click', () => window.location.href = 'login.html');
  document.getElementById('signupNavBtn')?.addEventListener('click', () => window.location.href = 'login.html?signup=true');

  // Initialize
  getUrlParams();
  initMap();
  loadProperties();
</script>
</body>
</html>
